name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  ci:
    runs-on: blacksmith-4vcpu-ubuntu-2404-arm
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '22'
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - name: Build
        run: pnpm -r build
      - name: Lint
        run: pnpm -r lint
      - name: Format check
        run: pnpm format:check
      - name: Type check
        run: pnpm -r typecheck
      - name: Test
        run: pnpm -r test
      - name: Security boundary tests
        run: pnpm --filter @edictum/core test -- --grep "security"
      - name: Check for workspace protocol leaks in published fields
        run: |
          node -e '
            const fs = require("fs");
            const path = require("path");
            let leaked = false;
            const pkgs = fs.readdirSync("packages").filter(d =>
              fs.existsSync(path.join("packages", d, "package.json"))
            );
            for (const pkg of pkgs) {
              const fp = path.join("packages", pkg, "package.json");
              const json = JSON.parse(fs.readFileSync(fp, "utf8"));
              let pkgClean = true;
              for (const field of ["dependencies", "peerDependencies", "optionalDependencies"]) {
                const deps = json[field];
                if (!deps) continue;
                for (const [name, version] of Object.entries(deps)) {
                  if (String(version).startsWith("workspace:")) {
                    console.error("FAIL: " + json.name + " " + field + "[\"" + name + "\"] = \"" + version + "\"");
                    leaked = true;
                    pkgClean = false;
                  }
                }
              }
              if (pkgClean) console.log("OK: " + json.name);
            }
            if (leaked) {
              console.error("ERROR: workspace: protocol in consumer-facing dependency fields");
              process.exit(1);
            }
            console.log("All packages clean — no workspace: protocol leaks in published fields");
          '

      - name: Audit npm dependencies
        run: pnpm audit --audit-level=critical
      - name: Audit npm dependencies (high — advisory)
        continue-on-error: true
        run: pnpm audit --audit-level=high
