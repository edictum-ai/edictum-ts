name: Parity Check

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 4 * * 1' # Weekly Monday 4am UTC

permissions:
  contents: read

concurrency:
  group: parity-check-${{ github.ref }}
  cancel-in-progress: true

jobs:
  gate:
    uses: edictum-ai/.github/.github/workflows/sdk-gate.yml@c3681294b8bcad3505a61c04f0eaae845648cb24
    with:
      runtime: node
      runtime-version: '22'
      setup-command: pnpm install --frozen-lockfile
      test-command: pnpm -r build && pnpm -r test
      conformance-command: >-
        pnpm --filter @edictum/core build &&
        EDICTUM_SCHEMAS_DIR=edictum-schemas
        EDICTUM_CONFORMANCE_REQUIRED=1
        pnpm --filter @edictum/core test -- tests/yaml-engine/shared-fixtures.test.ts
      fixture-ref: 31bae70afaa0fa4e24475324a562acfdddf83341
