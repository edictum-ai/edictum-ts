name: PR Title

on:
  pull_request:
    types: [opened, edited, synchronize]

permissions:
  pull-requests: read

jobs:
  validate:
    runs-on: self-hosted
    steps:
      - uses: amannn/action-semantic-pull-request@v5
        with:
          types: |
            feat
            fix
            docs
            test
            refactor
            chore
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
