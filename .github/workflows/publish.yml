name: Publish to npm

on:
  release:
    types: [published]

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: npm
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: ${{ github.event.release.tag_name }}

      - uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v4

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm -r build
      - run: pnpm -r test

      - name: Resolve workspace protocol references
        run: |
          node -e '
            const fs = require("fs");
            const path = require("path");
            const coreVersion = JSON.parse(
              fs.readFileSync("packages/core/package.json", "utf8")
            ).version;
            const pkgs = fs.readdirSync("packages").filter(d =>
              d !== "core" && fs.existsSync(path.join("packages", d, "package.json"))
            );
            for (const pkg of pkgs) {
              const fp = path.join("packages", pkg, "package.json");
              const raw = fs.readFileSync(fp, "utf8");
              const replaced = raw.replace(/"workspace:\*"/g, JSON.stringify("^" + coreVersion))
                                  .replace(/"workspace:~"/g, JSON.stringify("~" + coreVersion));
              if (raw !== replaced) {
                fs.writeFileSync(fp, replaced);
                console.log(`Resolved workspace refs in ${fp} → ^${coreVersion}`);
              }
            }
          '

      - name: Verify no workspace refs remain
        run: |
          if grep -r '"workspace:' packages/*/package.json; then
            echo "ERROR: workspace: protocol references found in package.json files"
            exit 1
          fi
          echo "All workspace references resolved"

      - name: Publish all packages
        run: |
          for pkg in core otel vercel-ai claude-sdk openai-agents langchain server; do
            echo "Publishing @edictum/$pkg..."
            cd packages/$pkg
            output=$(npm publish --access public --provenance 2>&1) && echo "$output" || {
              exit_code=$?
              if echo "$output" | grep -qE "EPUBLISHCONFLICT|E409|already exists|cannot publish over"; then
                echo "Skipped @edictum/$pkg (already published)"
              else
                echo "$output" >&2
                exit $exit_code
              fi
            }
            cd ../..
          done
