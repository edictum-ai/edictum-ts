name: Publish to npm

on:
  release:
    types: [published]

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: blacksmith-2vcpu-ubuntu-2404-arm
    environment: npm
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: ${{ github.event.release.tag_name }}

      - uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v4

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
          cache: pnpm

      - run: pnpm install --frozen-lockfile
      - run: pnpm -r build
      - run: pnpm -r test

      - name: Publish all packages
        run: |
          for pkg in core otel vercel-ai claude-sdk openai-agents langchain openclaw server; do
            echo "Publishing @edictum/$pkg..."
            cd packages/$pkg
            output=$(npm publish --access public --provenance 2>&1) && echo "$output" || {
              exit_code=$?
              if echo "$output" | grep -qE "EPUBLISHCONFLICT|E409|already exists|cannot publish over"; then
                echo "Skipped @edictum/$pkg (already published)"
              else
                echo "$output" >&2
                exit $exit_code
              fi
            }
            cd ../..
          done
