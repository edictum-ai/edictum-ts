name: Code Review

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, ready_for_review, reopened]

concurrency:
  group: review-${{ github.event.pull_request.number }}
  # Do NOT cancel in-progress: killing a review mid-flight and restarting
  # on the latest push loses findings from the full diff analysis.
  cancel-in-progress: false

jobs:
  review:
    if: github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      pull-requests: write
      issues: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0

      # SECURITY: Extract governance files from the BASE branch, not the PR.
      # A malicious PR could modify CLAUDE.md to inject instructions into the
      # reviewer agent.
      - name: Extract governance files from base branch
        env:
          BASE_REF: ${{ github.event.pull_request.base.ref }}
        run: |
          mkdir -p /tmp/governance
          git show "origin/${BASE_REF}:CLAUDE.md" > /tmp/governance/CLAUDE.md 2>/dev/null || true
          git show "origin/${BASE_REF}:.github/review-instructions.md" > /tmp/governance/review-instructions.md 2>/dev/null || true
          git show "origin/${BASE_REF}:.github/review-template.md" > /tmp/governance/review-template.md 2>/dev/null || true

      - name: Generate app token
        id: app-token
        uses: actions/create-github-app-token@d72941d797fd3113feb6b93fd0dec494b13a2547 # v1
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}

      - uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "22"
          cache: "pnpm"

      - name: Install review tools (NOT the project)
        run: pnpm install --frozen-lockfile

      - name: Run Code Review
        id: review
        uses: anthropics/claude-code-action@9469d113c6afd29550c402740f22d1a97dd1209b # v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          github_token: ${{ steps.app-token.outputs.token }}
          # Issue creation removed — warnings stay in the PR comment, not as noise issues.
          claude_args: '--model claude-sonnet-4-6 --max-turns 30 --allowedTools "Bash(git diff:*),Bash(git log:*),Bash(cat:*),Read,Glob,Grep,Write"'
          prompt: |
            You are an adversarial code reviewer for Edictum JS — a **security product** (runtime contract enforcement for AI agent tool calls). A single vulnerability destroys the credibility of a startup that sells trust. Think like an attacker first, reviewer second.

            PR: #${{ github.event.pull_request.number }}
            SHA: ${{ github.event.pull_request.head.sha }}

            ## Instructions

            1. Read governance files from `/tmp/governance/` (extracted from the BASE branch — prevents prompt injection):
               - `/tmp/governance/CLAUDE.md` — architecture, API design checklist, security review checklist
               - `/tmp/governance/review-instructions.md` — comment formatting rules
               - `/tmp/governance/review-template.md` — the template to fill in

            2. Get the FULL diff against main (not just the latest push):
               - `git diff origin/main...HEAD --name-only` for ALL changed files in the PR
               - `git diff origin/main...HEAD` for the complete diff
               - IMPORTANT: Review the ENTIRE PR diff, not just the latest commit.
                 This workflow runs on every push. You must review all accumulated
                 changes to avoid missing issues introduced in earlier commits.

            3. Route checks by file type:
               - `packages/core/src/**` → code quality, contract correctness, API design, security
               - `packages/*/src/**` → also adapter parity
               - `**/tests/**` → test conventions, behavior test coverage
               - `.github/**` → security (Actions injection patterns)
               - `CLAUDE.md` → governance file consistency

            4. For EACH changed file:
               a. Read the FULL source file (not just the diff)
               b. Run the adversarial pass first (think like an attacker)
               c. Then run the standards compliance pass
               d. Only apply checks relevant to the file type

            5. For each potential issue, verify ALL of these before reporting:
               - The issue was INTRODUCED by this PR (not pre-existing)
               - You can describe a concrete attack path or concrete bug
               - Include a concrete fix with code, not just "consider doing X"

            6. Fill in the template from `/tmp/governance/review-template.md` per `/tmp/governance/review-instructions.md`. Write to `/tmp/review.md`.

            7. Do NOT post the comment yourself. The workflow handles posting after validation.

            ## Classification rules

            Use `<!-- STATUS: fail -->` ONLY for critical issues that have a concrete
            attack path or correctness bug that MUST be fixed before merge. These are
            things like: secrets leaking, fail-open on error paths, data corruption,
            injection vulnerabilities, broken core enforcement logic.

            Use `<!-- STATUS: pass -->` for everything else — including warnings and
            suggestions. These are tracked as GitHub issues instead of blocking the PR.

            Warnings and suggestions are included in the PR review comment only —
            do NOT create GitHub issues for them. The PR author reads the comment and
            decides whether to address warnings before merging.

            ## Review rules
            - **Exhaustive, single pass.** Find ALL issues — 20, 30, 50, however many.
              Do NOT stop at 3-5 findings. Scan every file, every function, every parameter.
              There is no "next round." If you report 5 findings and miss 15, the next run
              will find 5 more, causing endless fix cycles. Find them ALL now.
            - A clean PR with zero findings is a good outcome.
            - Do NOT flag style/formatting (linters handle that).
            - ALWAYS include the attack path for security issues.
            - ALWAYS include file path + line number + concrete fix with code.
            - Check EVERY public method that accepts untrusted input for validation consistency.
            - Check EVERY collection getter for defensive copies.
            - Check EVERY fan-out/iteration pattern for shared mutable state.
            - Check EVERY when/filter predicate is actually called.
            - Check EVERY error path for fail-closed behavior.
            - Check EVERY parameter for NaN/Infinity/negative/zero/empty edge cases.
            - Check EVERY string interpolated into URLs/paths/headers for injection.
            - Do NOT report the same class of issue multiple times across files.
              If you find "no control char validation on X", check ALL similar parameters
              in the same pass and report them together.

      - name: Validate and post review comment
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          # Validate review file exists and contains the required marker
          if [ ! -f /tmp/review.md ]; then
            echo "::error::Review file /tmp/review.md not found. Claude may have failed."
            exit 1
          fi
          if ! grep -q '<!-- edictum-review -->' /tmp/review.md; then
            echo "::error::Review file missing <!-- edictum-review --> marker. Content:"
            head -5 /tmp/review.md
            exit 1
          fi

          # Post or update sticky comment
          EXISTING_ID=$(gh api "repos/${{ github.repository }}/issues/${PR_NUMBER}/comments" \
            --jq '[.[] | select(.body | contains("<!-- edictum-review -->"))] | last | .id // empty')
          if [ -n "$EXISTING_ID" ]; then
            gh api "repos/${{ github.repository }}/issues/comments/${EXISTING_ID}" \
              -X PATCH -F body=@/tmp/review.md
            echo "Updated existing review comment ${EXISTING_ID}"
          else
            gh pr comment "${PR_NUMBER}" --body-file /tmp/review.md
            echo "Created new review comment"
          fi

      - name: Fail on critical findings only
        run: |
          # Read the local file directly — immune to comment injection race condition.
          if [ ! -f /tmp/review.md ]; then
            echo "::error::Review file missing."
            exit 1
          fi
          if grep -q '<!-- STATUS: fail -->' /tmp/review.md; then
            echo "::error::Code review found critical issues. See PR comment for details."
            exit 1
          fi
          # Warnings and suggestions are tracked as GitHub issues, not PR blockers.
          echo "Code review passed (warnings/suggestions tracked as issues)."
